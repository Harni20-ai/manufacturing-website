<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | IndusCore</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .countdown { display: flex; justify-content: center; gap: var(--space-xl); margin: var(--space-xxl) 0; }
        .countdown-item { text-align: center; }
        .countdown-item div { font-size: 3rem; font-family: 'Oswald', sans-serif; color: var(--accent-primary); line-height: 1; }
        .countdown-item span { text-transform: uppercase; font-size: 0.8rem; color: var(--text-secondary); }
    </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center;">
    <div class="container">
        <div class="logo text-accent font-bold h2 mb-4">INDUSCORE</div>
        <h1>Next Gen <span>Automation</span> Launching Soon</h1>
        
        <div class="countdown">
            <div class="countdown-item"><div>24</div><span>Days</span></div>
            <div class="countdown-item"><div>12</div><span>Hours</span></div>
            <div class="countdown-item"><div>45</div><span>Mins</span></div>
            <div class="countdown-item"><div>08</div><span>Secs</span></div>
        </div>

        <p class="text-secondary mb-4">Get notified when we go live with our new catalog.</p>
        <form class="newsletter-form mx-auto" style="max-width: 500px; display: flex; gap: 10px;">
            <input type="email" placeholder="Enter your email" required style="flex: 1; padding: 12px; background: #111; border: 1px solid #2a2a2a; color: #fff;">
            <button type="submit" class="btn btn-primary">Notify Me</button>
        </form>

        <div class="social-links mt-xxl">
            <a href="#" class="mr-3"><i class="fab fa-linkedin fa-2x"></i></a>
            <a href="#" class="mr-3"><i class="fab fa-twitter fa-2x"></i></a>
        </div>
    </div>
</body>
</html>
