<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | IndusCore</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-layout { display: grid; grid-template-columns: 1fr 400px; gap: var(--space-xxl); }
        .checkout-form { background: var(--bg-secondary); padding: var(--space-xl); border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); margin-bottom: var(--space-md); }
        .form-group { margin-bottom: var(--space-md); }
        .form-group label { display: block; margin-bottom: var(--space-xs); font-size: 0.9rem; color: var(--text-secondary); }
        .form-group input { width: 100%; padding: 12px; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: var(--radius-sm); }
        .payment-methods { margin-top: var(--space-xl); padding-top: var(--space-xl); border-top: 1px solid var(--border-color); }
        .method { display: flex; align-items: center; gap: 10px; padding: 15px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); margin-bottom: var(--space-sm); cursor: pointer; }
        .method.active { border-color: var(--accent-primary); background: rgba(255, 90, 31, 0.05); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">INDUS<span class="text-accent">CORE</span></a>
        </div>
    </nav>

    <main class="container section-padding">
        <h1>Secure <span>Checkout</span></h1>
        
        <div class="checkout-layout">
            <div class="checkout-form">
                <h3 class="mb-4">Shipping Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Company Name (Optional)</label>
                    <input type="text" placeholder="Industries LLC">
                </div>
                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" placeholder="123 Industrial Way">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" placeholder="New York">
                    </div>
                    <div class="form-group">
                        <label>Postcode</label>
                        <input type="text" placeholder="10001">
                    </div>
                </div>

                <div class="payment-methods">
                    <h3 class="mb-4">Payment Method</h3>
                    <div class="method active">
                        <input type="radio" name="payment" checked>
                        <i class="fab fa-cc-stripe fa-2x"></i>
                        <span>Credit Card (Stripe)</span>
                    </div>
                    <div class="method">
                        <input type="radio" name="payment">
                        <i class="fab fa-cc-paypal fa-2x"></i>
                        <span>PayPal</span>
                    </div>
                </div>
            </div>

            <aside>
                <div class="stat-card">
                    <h3 class="mb-4">Your Order</h3>
                    <div class="d-flex justify-between mb-2">
                        <span>Servo Motor X-10 × 1</span>
                        <span>$2,450.00</span>
                    </div>
                    <div class="border-top pt-2 mt-2">
                        <div class="d-flex justify-between h4">
                            <span>Total</span>
                            <span class="text-accent">$2,450.00</span>
                        </div>
                    </div>
                    <button class="btn btn-primary w-full mt-4">Place Order</button>
                    <p class="text-center text-secondary small mt-3"><i class="fas fa-lock"></i> SSL Secured Payment</p>
                </div>
            </aside>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
</body>
</html>
