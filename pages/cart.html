<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | IndusCore</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-table { width: 100%; border-collapse: collapse; margin-top: var(--space-xl); }
        .cart-table th { text-align: left; padding: var(--space-md); border-bottom: 1px solid var(--border-color); color: var(--text-secondary); }
        .cart-table td { padding: var(--space-lg) var(--space-md); border-bottom: 1px solid var(--border-color); }
        .cart-product { display: flex; align-items: center; gap: var(--space-md); }
        .cart-product img { width: 80px; border-radius: var(--radius-sm); }
        .cart-summary {
            background: var(--bg-secondary);
            padding: var(--space-xl);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            margin-top: var(--space-xxl);
            max-width: 400px;
            margin-left: auto;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">INDUS<span class="text-accent">CORE</span></a>
            <div class="nav-actions">
                <a href="shop.html" class="btn btn-outline">Continue Shopping</a>
            </div>
        </div>
    </nav>

    <main class="container section-padding">
        <h1>Shopping <span>Cart</span></h1>
        
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="cart-product">
                            <img src="../assets/images/product-1.png" alt="Product">
                            <div>
                                <h4 class="m-0">Servo Motor X-10</h4>
                                <small class="text-secondary">SKU: IND-9920</small>
                            </div>
                        </div>
                    </td>
                    <td>$2,450.00</td>
                    <td><input type="number" value="1" class="p-2 bg-primary border-color text-primary w-20"></td>
                    <td>$2,450.00</td>
                    <td><button class="text-danger" style="background:none; border:none; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                </tr>
            </tbody>
        </table>

        <div class="cart-summary">
            <h3 class="mb-4">Order Summary</h3>
            <div class="d-flex justify-between mb-2">
                <span>Subtotal</span>
                <span>$2,450.00</span>
            </div>
            <div class="d-flex justify-between mb-2">
                <span>Shipping</span>
                <span class="text-success">Free</span>
            </div>
            <div class="d-flex justify-between h3 mt-4 pt-4 border-top">
                <span>Total</span>
                <span>$2,450.00</span>
            </div>
            <a href="checkout.html" class="btn btn-primary w-full mt-4">Proceed to Checkout</a>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
</body>
</html>
